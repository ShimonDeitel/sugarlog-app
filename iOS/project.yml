name: BloodSugarNote
options:
  bundleIdPrefix: com.shimondeitel.sugarnote
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BloodSugarNote:
    type: application
    platform: iOS
    sources:
      - path: BloodSugarNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sugarnote
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BloodSugarNote/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BloodSugarNoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BloodSugarNoteTests
      - path: BloodSugarNote.storekit
    dependencies:
      - target: BloodSugarNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sugarnote.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BloodSugarNoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BloodSugarNoteUITests
    dependencies:
      - target: BloodSugarNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sugarnote.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BloodSugarNote:
    build:
      targets:
        BloodSugarNote: all
        BloodSugarNoteTests: [test]
        BloodSugarNoteUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BloodSugarNote.storekit
    test:
      config: Debug
      storeKitConfiguration: BloodSugarNote.storekit
      targets:
        - BloodSugarNoteTests
        - BloodSugarNoteUITests
    archive:
      config: Release
